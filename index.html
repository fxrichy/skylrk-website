<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLRK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #000;
        }
        
        /* Gradient background with grain effect */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(
                180deg,
                #87CEEB 0%,
                #5BA8C4 15%,
                #2D7A9A 30%,
                #1A4A5C 45%,
                #0D2A36 60%,
                #000000 75%,
                #000000 100%
            );
            z-index: -1;
        }
        
        /* Noise/grain texture overlay */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        /* SKYLRK custom logo font */
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 0.15em;
            font-size: 0.9rem;
        }
        
        /* Pill-shaped button styling */
        .pill-btn {
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 9999px;
            background: transparent;
            color: white;
            padding: 8px 16px;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .pill-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        /* Product floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(-1deg); }
        }
        
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .float-1 { animation: float 6s ease-in-out infinite; }
        .float-2 { animation: float-reverse 7s ease-in-out infinite; }
        .float-3 { animation: float-slow 8s ease-in-out infinite; }
        .float-4 { animation: float 5.5s ease-in-out infinite; }
        .float-5 { animation: float-reverse 6.5s ease-in-out infinite; }
        
        /* Cookie banner */
        .cookie-banner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 320px;
            z-index: 100;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            line-height: 1.5;
        }
        
        .cookie-banner button {
            margin-top: 12px;
            padding: 6px 14px;
            font-size: 0.65rem;
            margin-right: 8px;
            cursor: pointer;
        }
        
        .cookie-banner .accept-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 4px;
        }
        
        .cookie-banner .reject-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
        }
        
        /* Product image styling */
        .product-img {
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
            transition: transform 0.4s ease;
        }
        
        .product-img:hover {
            transform: scale(1.05);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .product-grid {
                transform: scale(0.7);
            }
        }
    </style>
</head>
<body class="text-white">
    <!-- Background -->
    <div class="hero-bg"></div>
    <div class="grain-overlay"></div>
    
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-5">
        <!-- Left: Logo and Cart -->
        <div class="flex items-center gap-4">
            <button class="pill-btn logo-text flex items-center gap-2">
                SKYLRK
            </button>
            <button class="w-10 h-10 rounded-full border border-white/60 flex items-center justify-center text-xs">
                <span>0 +</span>
            </button>
        </div>
        
        <!-- Right: Currency -->
        <div class="text-sm tracking-wider text-white/80">
            [ $USD ]
        </div>
    </header>
    
    <!-- Main Content - Floating Products -->
    <main class="relative w-full min-h-screen flex items-center justify-center pt-20">
        <div class="product-grid relative w-full max-w-6xl mx-auto px-4" style="height: 85vh;">
            
            <!-- Product 1: Dark Gray Hoodie (Top Left) -->
            <div class="absolute float-1" style="top: 5%; left: 5%; width: 280px;">
                <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400&h=500&fit=crop" 
                     alt="Dark Hoodie" 
                     class="product-img w-full h-auto object-contain rounded-lg"
                     style="filter: brightness(1.1) contrast(1.1) drop-shadow(0 15px 40px rgba(0,0,0,0.4));">
            </div>
            
            <!-- Product 2: Sunglasses (Top Center) -->
            <div class="absolute float-2" style="top: 2%; left: 50%; transform: translateX(-50%); width: 220px;">
                <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400&h=200&fit=crop" 
                     alt="Sunglasses" 
                     class="product-img w-full h-auto object-contain"
                     style="filter: sepia(0.3) saturate(1.2) hue-rotate(15deg) drop-shadow(0 10px 30px rgba(0,0,0,0.3));">
            </div>
            
            <!-- Product 3: Pink Hoodie (Top Right) -->
            <div class="absolute float-3" style="top: 8%; right: 8%; width: 260px;">
                <img src="https://images.unsplash.com/photo-1578768079052-aa76e52ff62e?w=400&h=500&fit=crop" 
                     alt="Pink Hoodie" 
                     class="product-img w-full h-auto object-contain rounded-lg"
                     style="filter: saturate(0.9) brightness(1.05) drop-shadow(0 12px 35px rgba(0,0,0,0.35));">
            </div>
            
            <!-- Product 4: Black Hoodie (Left Center) -->
            <div class="absolute float-4" style="top: 35%; left: 8%; width: 300px;">
                <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=400&h=550&fit=crop" 
                     alt="Black Hoodie" 
                     class="product-img w-full h-auto object-contain rounded-lg"
                     style="filter: brightness(0.9) contrast(1.15) drop-shadow(0 18px 45px rgba(0,0,0,0.45));">
            </div>
            
            <!-- Product 5: Blue Polka Dot Hoodie with LIVE (Right Center) -->
            <div class="absolute float-1" style="top: 30%; right: 5%; width: 320px;">
                <div class="relative">
                    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=450&h=600&fit=crop" 
                         alt="Blue Polka Dot Hoodie" 
                         class="product-img w-full h-auto object-contain rounded-lg"
                         style="filter: brightness(1.1) saturate(1.05) drop-shadow(0 15px 40px rgba(0,0,0,0.4));">
                    <div class="absolute top-1/3 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
                        <span class="text-3xl font-bold tracking-widest" style="font-family: 'Orbitron', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); mix-blend-mode: overlay;">LIVE</span>
                    </div>
                </div>
            </div>
            
            <!-- Product 6: Biebervelli Hoodie (Middle Left) -->
            <div class="absolute float-5" style="top: 65%; left: 15%; width: 260px;">
                <img src="https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=380&h=480&fit=crop" 
                     alt="Biebervelli Hoodie" 
                     class="product-img w-full h-auto object-contain rounded-lg"
                     style="filter: brightness(0.95) contrast(1.05) drop-shadow(0 12px 35px rgba(0,0,0,0.35));">
            </div>
            
            <!-- Product 7: Patterned Hoodie with LIVE (Bottom Center) -->
            <div class="absolute float-2" style="top: 60%; left: 45%; transform: translateX(-50%); width: 280px;">
                <div class="relative">
                    <img src="https://images.unsplash.com/photo-1607345366928-199ea26cfe3e?w=400&h=520&fit=crop" 
                         alt="Patterned Hoodie" 
                         class="product-img w-full h-auto object-contain rounded-lg"
                         style="filter: contrast(1.1) brightness(1.05) drop-shadow(0 14px 38px rgba(0,0,0,0.38));">
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                        <span class="text-2xl font-bold tracking-widest" style="font-family: 'Orbitron', sans-serif; text-shadow: 2px 2px 6px rgba(0,0,0,0.9);">LIVE</span>
                    </div>
                </div>
            </div>
            
            <!-- Product 8: Pink Sunglasses (Bottom Right) -->
            <div class="absolute float-3" style="top: 70%; right: 10%; width: 200px;">
                <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=350&h=180&fit=crop" 
                     alt="Pink Sunglasses" 
                     class="product-img w-full h-auto object-contain"
                     style="filter: hue-rotate(320deg) saturate(1.3) drop-shadow(0 10px 25px rgba(0,0,0,0.3));">
            </div>
            
        </div>
    </main>
    
    <!-- Cookie Banner -->
    <div class="cookie-banner" id="cookieBanner">
        <p>WE USE COOKIES TO ENSURE YOU GET THE BEST EXPERIENCE ON OUR WEBSITE.</p>
        <div>
            <button class="reject-btn" onclick="dismissCookie()">REJECT ALL</button>
            <button class="accept-btn" onclick="dismissCookie()">ACCEPT ALL</button>
        </div>
    </div>
    
    <script>
        function dismissCookie() {
            document.getElementById('cookieBanner').style.display = 'none';
        }
        
        // Add subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const products = document.querySelectorAll('.product-img');
            const x = (window.innerWidth - e.pageX) / 50;
            const y = (window.innerHeight - e.pageY) / 50;
            
            products.forEach((product, index) => {
                const speed = (index + 1) * 0.3;
                product.style.transform = `translateX(${x * speed}px) translateY(${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
